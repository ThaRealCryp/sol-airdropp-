        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #0d1b2a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: radial-gradient(circle, #00ffff 0%, #ff00ff 70%, transparent 100%);
            border-radius: 50%; animation: float 6s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }
        .header {
            text-align: center; color: #00ffff; margin-bottom: 30px;
            text-shadow: 0 0 20px #00ffff;
        }
        .header h1 { font-size: 2.2em; font-weight: 900; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .airdrop-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); border-radius: 20px;
            padding: 40px; border: 1px solid rgba(0,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center; transition: all 0.3s ease;
        }
        .airdrop-card:hover { transform: translateY(-5px); border-color: #00ffff; }
        .sol-amount {
            font-size: 3.5em; font-weight: 900; background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 20px 0; text-shadow: 0 0 30px currentColor;
        }
        .connect-btn, .claim-btn {
            width: 100%; padding: 18px; font-size: 1.2em; font-weight: 700;
            border: none; border-radius: 15px; cursor: pointer;
            font-family: 'Orbitron', monospace; transition: all 0.3s ease;
            margin: 15px 0;
        }
        .connect-btn {
            background: linear-gradient(45deg, #00ff88, #00cc66);
            color: #000; box-shadow: 0 10px 30px rgba(0,255,136,0.4);
        }
        .connect-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,255,136,0.6); }
        .claim-btn {
            background: linear-gradient(45deg, #ff0080, #ff4d4d);
            color: white; box-shadow: 0 10px 30px rgba(255,0,128,0.4);
            display: none;
        }
        .claim-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,0,128,0.6); }
        .claim-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
            background: #666;
        }
        .status {
            margin-top: 20px; padding: 15px; border-radius: 10px;
            font-weight: 700; min-height: 20px;
        }
        .status.connecting, .status.claiming { color: #00ff88; }
        .status.error { color: #ff4d4d; }
        .status.success { color: #00ff88; animation: pulse 1s infinite; }
